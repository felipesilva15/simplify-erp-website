<aside class="sidebar bg-white h-full w-18rem p-3 pt-4">
    <div class="mb-7">
        <app-logo [height]="'34px'" [link]="'/'" class="mr-4"></app-logo>
        <!-- <button pButton [text]="true">
            <span class="material-symbols-outlined font-light">
                dock_to_right
            </span>
        </button> -->
    </div>
    <div>
        <p-divider />
        <p-panelMenu [model]="menu">
            <ng-template #item let-item>
                @if (item.link) {
                    <a [routerLink]="[item.link]" class="flex align-items-center border-none justify-content-between px-3 py-2 border-round cursor-pointer no-underline transition-colors transition-duration-300" [class.active]="item.active">
                        <div class="flex align-items-center gap-3">
                            <i [class]="item.icon" class="text-lg"></i>
                            <span class="text-sm">{{ item.label }}</span>
                        </div>
                        @if (item.items) {
                            <i
                                class="pi pi-chevron-right text-xs transition-transform transition-duration-200"
                                [ngClass]="{ 'rotate-90': item.expanded }"
                            ></i>
                        }
                    </a>
                }
                @else {
                    <div class="flex align-items-center border-none justify-content-between px-3 py-2 border-round cursor-pointer transition-colors transition-duration-300" [class.active]="item.active">
                        <div class="flex align-items-center gap-3">
                            <i [class]="item.icon" class="text-lg"></i>
                            <span class="text-sm">{{ item.label }}</span>
                        </div>
                        @if (item.items) {
                            <i
                                class="pi pi-chevron-right text-xs transition-transform transition-duration-200"
                                [ngClass]="{ 'rotate-90': item.expanded }"
                            ></i>
                        }
                    </div>
                }
            </ng-template>
        </p-panelMenu>
        <p-divider />
    </div>
</aside>
