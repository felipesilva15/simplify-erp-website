<nav class="navbar bg-white w-full flex row justify-content-end align-items px-3">
    <div class="flex row gap-3 align-items-center">
        <p-button icon="pi pi-moon" [rounded]="true" [text]="true" [raised]="true" [disabled]="true" />
        <p-button icon="pi pi-bell" [rounded]="true" [text]="true" [raised]="true" [disabled]="true" />
        <div class="flex flex-row gap-2 align-items-center cursor-pointer" (click)="menu.toggle($event)">
            <p-avatar [icon]="user?.avatar_url ? undefined : 'pi pi-user'" [image]="user?.avatar_url ?? undefined"  shape="circle" style="height: 40px; width: 40px;" />
            <span class="font-semibold text-sm">{{ user?.name }}</span>
            <i class="pi pi-chevron-down"></i>
            <p-menu #menu [model]="menuItems" [popup]="true" />
        </div>
    </div>
</nav>
